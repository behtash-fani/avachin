name: Avachin core tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  avachin-core-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile changed Python files
        run: |
          python -m py_compile tools/avachin_launcher.py
          python -m py_compile tools/avachin_local_first_launcher.py
          python -m py_compile tools/create_unknown_test_copy.py
          python -m py_compile tools/diagnose_local_first_file.py
          python -m py_compile tools/fingerprint_store_v2.py
          python -m py_compile tools/local_fingerprint_library.py
          python -m py_compile tools/summarize_preview_fingerprints.py
          python -m py_compile tests/test_create_unknown_test_copy.py
          python -m py_compile tests/test_fingerprint_schema_v2.py
          python -m py_compile tests/test_local_first_launcher.py
          python -m py_compile tests/test_preview_fingerprint_summary.py

      - name: Run regression tests
        run: |
          python tests/test_create_unknown_test_copy.py
          python tests/test_fingerprint_schema_v2.py
          python tests/test_local_first_launcher.py
          python tests/test_preview_fingerprint_summary.py
