name: Avachin core tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  avachin-core-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile project Python
        run: python -m compileall -q smart_music_organizer.py configure.py tools tests

      - name: Run isolated regression tests
        shell: bash
        run: |
          set -euo pipefail
          for test_file in tests/test_*.py; do
            echo "::group::${test_file}"
            python "${test_file}"
            echo "::endgroup::"
          done

      - name: Run P5-08 acceptance baseline
        run: python tools/run_acceptance.py --report-dir reports/acceptance

      - name: Upload acceptance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: avachin-acceptance-report
          path: reports/acceptance/
          if-no-files-found: warn
