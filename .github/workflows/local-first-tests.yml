name: Avachin core tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  avachin-core-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile project Python
        run: python -m compileall -q smart_music_organizer.py configure.py tools tests

      - name: Run isolated regression tests
        shell: bash
        run: |
          set -euo pipefail
          passed=0
          failure_log="${RUNNER_TEMP}/regression-failure.log"
          rm -f "${failure_log}"
          for test_file in tests/test_*.py; do
            log_file="${RUNNER_TEMP}/$(basename "${test_file}").log"
            if python "${test_file}" >"${log_file}" 2>&1; then
              passed=$((passed + 1))
              echo "PASS ${test_file}"
            else
              {
                echo "FAILED_TEST=${test_file}"
                echo "----- ${test_file} output -----"
                cat "${log_file}"
              } >"${failure_log}"
              echo "::error title=Regression test failed::${test_file}"
              cat "${failure_log}"
              exit 1
            fi
          done
          echo "Regression summary: ${passed} isolated test files passed."

      - name: Upload regression failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-log
          path: ${{ runner.temp }}/regression-failure.log
          if-no-files-found: error

      - name: Run P5-08 acceptance baseline
        run: python tools/run_acceptance.py --report-dir reports/acceptance

      - name: Upload acceptance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: avachin-acceptance-report
          path: reports/acceptance/
          if-no-files-found: warn
