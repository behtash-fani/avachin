name: Avachin core tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  avachin-core-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile changed Python files
        run: |
          python -m py_compile tools/audio_repair.py
          python -m py_compile tools/audd_usage_guard.py
          python -m py_compile tools/avachin_audd_budget_launcher.py
          python -m py_compile tools/avachin_launcher.py
          python -m py_compile tools/avachin_local_first_launcher.py
          python -m py_compile tools/avachin_online_auto_learn_launcher.py
          python -m py_compile tools/avachin_partial_fingerprint_launcher.py
          python -m py_compile tools/avachin_resilient_bulk_index_launcher.py
          python -m py_compile tools/bulk_index_library.py
          python -m py_compile tools/create_mid_song_test_clip.py
          python -m py_compile tools/create_unknown_test_copy.py
          python -m py_compile tools/diagnose_local_first_file.py
          python -m py_compile tools/fingerprint_store_v2.py
          python -m py_compile tools/local_fingerprint_library.py
          python -m py_compile tools/partial_fingerprint_library.py
          python -m py_compile tools/partial_fingerprint_store.py
          python -m py_compile tools/summarize_preview_fingerprints.py
          python -m py_compile tests/test_audio_repair.py
          python -m py_compile tests/test_audd_budget_guard.py
          python -m py_compile tests/test_bulk_index_library.py
          python -m py_compile tests/test_create_unknown_test_copy.py
          python -m py_compile tests/test_fingerprint_schema_v2.py
          python -m py_compile tests/test_local_first_launcher.py
          python -m py_compile tests/test_online_auto_learn_launcher.py
          python -m py_compile tests/test_partial_fingerprint_v3.py
          python -m py_compile tests/test_preview_fingerprint_summary.py

      - name: Repair temp copy and cleanup
        run: python tests/test_audio_repair.py AudioRepairTests.test_temporary_repair_is_validated_and_original_is_untouched -v

      - name: Repair failure preserves original
        run: python tests/test_audio_repair.py AudioRepairTests.test_failed_repair_does_not_modify_or_delete_original -v

      - name: Fingerprint runtime retries repaired copy
        run: python tests/test_audio_repair.py AudioRepairTests.test_runtime_retries_decode_failure_with_temporary_copy -v

      - name: Non-decode failures bypass repair
        run: python tests/test_audio_repair.py AudioRepairTests.test_non_decode_failure_is_not_repaired -v

      - name: Repair errors preserve original failure
        run: python tests/test_audio_repair.py AudioRepairTests.test_repair_failure_is_reported_without_hiding_original_error -v

      - name: UI listeners cannot break processing
        run: python tests/test_audio_repair.py AudioRepairTests.test_listener_errors_cannot_break_repair_notifications -v

      - name: Audio repair CLI help
        run: python tests/test_audio_repair.py AudioRepairTests.test_direct_cli_help_from_project_root -v

      - name: Run existing regression tests
        run: |
          python tests/test_audd_budget_guard.py
          python tests/test_bulk_index_library.py
          python tests/test_create_unknown_test_copy.py
          python tests/test_fingerprint_schema_v2.py
          python tests/test_local_first_launcher.py
          python tests/test_online_auto_learn_launcher.py
          python tests/test_partial_fingerprint_v3.py
          python tests/test_preview_fingerprint_summary.py
